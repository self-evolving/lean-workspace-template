name: Agent / Review Nudge

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: sepo-review-nudge-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  nudge:
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      github.event.pull_request.draft != true &&
      !startsWith(github.event.pull_request.head.ref, 'agent/')
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - name: Wait before checking review state
        env:
          REVIEW_NUDGE_DELAY_SECONDS: ${{ vars.AGENT_REVIEW_NUDGE_DELAY_SECONDS || '180' }}
        run: |
          set -euo pipefail
          delay="$REVIEW_NUDGE_DELAY_SECONDS"
          if ! [[ "$delay" =~ ^[0-9]+$ ]]; then
            delay=180
          fi
          if [ "$delay" -gt 300 ]; then
            delay=300
          fi
          sleep "$delay"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime

      - name: Post review nudge
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AGENT_HANDLE: ${{ vars.AGENT_HANDLE || '@sepo-agent' }}
          AGENT_REVIEW_LABEL: agent/review
          SEPO_PREVIEW_LABEL: sepo-preview
        run: node .agent/dist/cli/post-review-nudge.js
